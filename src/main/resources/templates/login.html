<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Login')}"></head>
<body style="background:var(--bg-app);min-height:100vh;display:flex;align-items:center;justify-content:center;">

<div style="width:100%;max-width:400px;padding:24px;">

    <!-- Brand -->
    <div class="text-center mb-4">
        <i class="fa-solid fa-robot" style="color:#58a6ff;font-size:48px;"></i>
        <div style="font-size:28px;font-weight:700;color:#e6edf3;margin-top:12px;letter-spacing:.5px;">Cerebro</div>
        <div style="font-size:13px;color:#8b949e;margin-top:4px;">AI Trading Dashboard</div>
    </div>

    <!-- Card -->
    <div class="stat-card">

        <!-- Flash messages -->
        <div th:if="${errorMsg}" class="alert alert-danger py-2 px-3 mb-3"
             style="background:#da363322;border:1px solid #da363355;color:#f85149;border-radius:6px;font-size:13px;">
            <i class="fa-solid fa-circle-xmark me-2"></i>
            <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${logoutMsg}" class="alert alert-success py-2 px-3 mb-3"
             style="background:#23863622;border:1px solid #23863655;color:#3fb950;border-radius:6px;font-size:13px;">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${logoutMsg}"></span>
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label for="username" style="font-size:12px;font-weight:600;color:#8b949e;letter-spacing:.5px;text-transform:uppercase;">
                    Username
                </label>
                <input type="text" id="username" name="username" required autofocus
                       class="form-control mt-1"
                       style="background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:10px 12px;font-size:14px;"
                       placeholder="Enter username"/>
            </div>

            <div class="mb-4">
                <label for="password" style="font-size:12px;font-weight:600;color:#8b949e;letter-spacing:.5px;text-transform:uppercase;">
                    Password
                </label>
                <input type="password" id="password" name="password" required
                       class="form-control mt-1"
                       style="background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:10px 12px;font-size:14px;"
                       placeholder="Enter password"/>
            </div>

            <button type="submit" class="btn w-100"
                    style="background:#238636;color:#fff;border:none;padding:10px;border-radius:6px;font-weight:600;font-size:14px;">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>
        </form>
    </div>

    <div class="text-center mt-3" style="font-size:11px;color:#8b949e;">
        Cerebro &nbsp;·&nbsp; Secured &nbsp;·&nbsp; IST
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
