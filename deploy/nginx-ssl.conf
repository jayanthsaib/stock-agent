# ============================================================
# Nginx config — Stock Agent with self-signed HTTPS
#
# Install:
#   sudo cp nginx-ssl.conf /etc/nginx/sites-available/stock-agent
#   sudo ln -sf /etc/nginx/sites-available/stock-agent /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Generate self-signed cert (run once):
#   sudo mkdir -p /etc/nginx/ssl
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/stock-agent.key \
#     -out    /etc/nginx/ssl/stock-agent.crt \
#     -subj "/C=IN/ST=Maharashtra/L=Mumbai/O=StockAgent/CN=13.203.216.12"
#
# When you get a domain, replace with Let's Encrypt:
#   sudo certbot --nginx -d yourdomain.com
# ============================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/stock-agent.crt;
    ssl_certificate_key /etc/nginx/ssl/stock-agent.key;

    # Modern TLS only
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Proxy to Spring Boot
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for long-running endpoints (/api/refresh, /api/backtest)
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;
    }
}
